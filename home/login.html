<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - RamStore</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

    <section class="form-panel panel" aria-label="Form">
      <div class="tabs" role="tablist" aria-label="Login dan Registrasi">
        <div class="tab active" id="tabLogin" role="tab" aria-selected="true">Login</div>
        <div class="tab" id="tabRegister" role="tab" aria-selected="false">Registrasi</div>
      </div>

      <!-- LOGIN -->
      <div id="viewLogin">
        <h2 class="form-title">Masuk</h2>
        <p class="form-subtitle">Masukkan email dan password untuk melanjutkan.</p>

        <div class="message" id="loginMsg"></div>

        <form id="loginForm" action="" method="POST" autocomplete="on">
          <label class="field">
            <span class="sr-only">Email</span>
            <div class="input-wrap">
              <i class='bx bx-envelope' aria-hidden="true"></i>
              <input type="email" name="email" placeholder="Email" required />
            </div>
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <div class="input-wrap">
              <i class='bx bx-lock-alt' aria-hidden="true"></i>
              <input type="password" name="password" placeholder="Password" required />
            </div>
          </label>

          <div class="row">
            <label class="remember"><input type="checkbox" name="remember" /> Remember me</label>
            <a href="#" onclick="return false">Forgot Password?</a>
          </div>
          <button class="btn" type="submit">Login</button>

          <div class="switch-text">
            Belum punya akun? <a href="#" id="goRegister">Buat akun</a>
          </div>
        </form>
      </div>

      <!-- REGISTER -->
      <div id="viewRegister" style="display:none;">
        <h2 class="form-title">Buat Akun</h2>
        <p class="form-subtitle">Daftarkan username, email, dan password.</p>

        <div class="message" id="registerMsg"></div>

        <form id="registerForm" action="home.php" method="POST" autocomplete="on">
          <label class="field">
            <span class="sr-only">Username</span>
            <div class="input-wrap">
              <i class='bx bx-user' aria-hidden="true"></i>
              <input type="text" name="username" placeholder="Username" required />
            </div>
          </label>

          <label class="field">
            <span class="sr-only">Email</span>
            <div class="input-wrap">
              <i class='bx bx-envelope' aria-hidden="true"></i>
              <input type="email" name="email" placeholder="Email" required />
            </div>
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <div class="input-wrap">
              <i class='bx bx-lock-alt' aria-hidden="true"></i>
              <input type="password" name="password" placeholder="Password" required />
            </div>
          </label>

          <div class="row">
            <label class="remember"><input type="checkbox" name="agree" required /> I agree</label>
            <span style="color:rgba(255,255,255,.55); font-size:13px;">&nbsp;</span>
          </div>

          <button class="btn" type="submit">Registration</button>

          <div class="switch-text">
            Sudah punya akun? <a href="#" id="goLogin">Login</a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
