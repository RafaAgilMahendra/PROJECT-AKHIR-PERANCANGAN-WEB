<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabel Produk - RamStore</title>
  <link rel="stylesheet" href="css/produk.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>
<body>

  <header>
    <div class="nav container">
      <a href="home.html" class="logo">RamStore</a>
      <div class="icons-container" id="nav-menu">
        <a class="navigation" href="home.html">Home</a>
        <a class="navigation" href="galeri.html">Galeri</a>
        <a class="navigation" href="produk.html">Produk</a>
        <a class="navigation" href="testimoni.html">Testimoni</a>
        <a class="navigation" href="tentang.html">Tentang</a>
      </div>
      <div class="header-actions">
        <button class="btnLogin-popup">Login</button>
        <i class='bx bx-menu' id="menu-icon"></i>
      </div>
    </div>
  </header>

  <main class="table-section">
    <div class="container">
      <h1 class="page-title">Tabel Produk</h1>

      <div class="table-toolbar">
        <div class="cart-info" onclick="viewCart()" style="cursor: pointer;">
            <i class='bx bx-cart'></i>
            <span>Keranjang: <strong id="cartCount">0</strong> item</span>
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Semua</button>
          <button class="filter-btn" data-filter="sepatu">Sepatu</button>
          <button class="filter-btn" data-filter="tas">Tas</button>
          <button class="filter-btn" data-filter="pakaian">Pakaian</button>
          <button class="filter-btn" data-filter="topi">Topi</button>
          <button class="filter-btn" data-filter="aksesoris">Aksesoris</button>
          <button class="filter-btn" data-filter="sabuk">Sabuk</button>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Gambar</th>
                <th>Produk</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="productTableBody">
              </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeCart()">&times;</span>
      <h2>Keranjang Anda</h2>
      
      <div id="cartItemsList"></div>
      
      <div id="cartTotal"></div>
    </div>
  </div>

  <script src="js/produk.js"></script>
</body>
</html>
